# Welcome to Jekyll!
# Basic Site Settings
locale                   : "en-DE"
site_theme               : "default"
title                    : "Belin Korukoglu – Bioinformatics & AI Research"
title_separator          : "-"
name                     : &name "Belin Korukoglu"
description              : &description "Master’s student in Bioinformatics at Saarland University focusing on AI, ML, and scalable systems for healthcare and geospatial intelligence."
url                      : https://fulbelin.github.io
baseurl                  : ""
repository               : "academicpages/academicpages.github.io"

# Site Author
author:
  avatar           : "profile_photo.png"
  name             : "Belin Korukoglu"
  pronouns         : "she/her"
  bio              : "Master's student in bioinformatics exploring AI/ML in healthcare and scalable systems."
  location         : "Germany"
  school           : "Saarland University"
  uri              :
  email            : "fulbelin.korukoglu@gmail.com"

  # Academic websites
  googlescholar    : "https://scholar.google.com/citations?user=Hdj-VHIAAAAJ&hl=en"
  orcid            : "https://orcid.org/0009-0005-7211-2022"
  researchgate     : "https://www.researchgate.net/profile/Ful-Belin-Korukoglu"

  # Development
  github           : "fulbelin"

  # Social media
  linkedin         : "https://www.linkedin.com/in/belin-korukoglu"

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :

# RSS Feed
atom_feed:
  hide                   : false
  path                   :

# ✅ SEO Related
google_site_verification :   # <-- After Search Console, paste token here
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# ✅ Social Sharing
twitter:
  username               :
facebook:
  username               :
og_image                 :

# ✅ Structured Data for Google Knowledge Panel
social:
  type                   : Person
  name                   : "Belin Korukoglu"
  links:
    - https://fulbelin.github.io
    - https://www.linkedin.com/in/belin-korukoglu
    - https://scholar.google.com/citations?user=Hdj-VHIAAAAJ
    - https://github.com/fulbelin

# Analytics (optional)
analytics:
  provider               : "false"

# Include / Exclude
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true

  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Berlin

# ✅ Plugins (sitemap is here!)
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
